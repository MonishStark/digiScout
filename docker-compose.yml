# @format

version: "3.8"

services:
  # Nginx reverse proxy and static frontend server
  nginx:
    image: nginx:alpine
    container_name: digitalscout-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./dist:/var/www/html/frontend:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
      - wordpress
    networks:
      - digitalscout-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Node/Express backend API server
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: digitalscout-app
    environment:
      - NODE_ENV=production
      - PORT=5001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_MAPS_PLATFORM_KEY=${GOOGLE_MAPS_PLATFORM_KEY}
      - VITE_NETLIFY_TOKEN=${VITE_NETLIFY_TOKEN}
      - NETLIFY_TOKEN=${NETLIFY_TOKEN}
      - CALLHIPPO_API_KEY=${CALLHIPPO_API_KEY}
      - WORDPRESS_MULTISITE_BASE_URL=http://wordpress:80
      - WORDPRESS_MULTISITE_NETWORK_USERNAME=${WORDPRESS_MULTISITE_NETWORK_USERNAME}
      - WORDPRESS_MULTISITE_NETWORK_APP_PASSWORD=${WORDPRESS_MULTISITE_NETWORK_APP_PASSWORD}
    expose:
      - "5001"
    volumes:
      - ./dist:/app/dist:ro
      - app_logs:/var/log/app
    depends_on:
      - wordpress
      - mariadb
    networks:
      - digitalscout-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # WordPress Multisite CMS
  wordpress:
    image: wordpress:php8.2-fpm
    container_name: digitalscout-wordpress
    environment:
      - WORDPRESS_DB_HOST=mariadb
      - WORDPRESS_DB_NAME=${WORDPRESS_DB_NAME}
      - WORDPRESS_DB_USER=${WORDPRESS_DB_USER}
      - WORDPRESS_DB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - WORDPRESS_CONFIG_EXTRA=${WORDPRESS_CONFIG_EXTRA}
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/wordpress/wp-config-extra.php:/wp-config-extra.php:ro
      - ./wordpress/multisite-mvp-provisioner:/var/www/html/wp-content/plugins/multisite-mvp-provisioner:ro
      - ./docker/wordpress/digital-scout-base-theme:/var/www/html/wp-content/themes/digital-scout-base-theme:ro
    expose:
      - "9000"
    depends_on:
      - mariadb
    networks:
      - digitalscout-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MariaDB database
  mariadb:
    image: mariadb:11
    container_name: digitalscout-mariadb
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${WORDPRESS_DB_NAME}
      - MARIADB_USER=${WORDPRESS_DB_USER}
      - MARIADB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    expose:
      - "3306"
    networks:
      - digitalscout-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  digitalscout-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  wordpress_data:
    driver: local
  nginx_logs:
    driver: local
  app_logs:
    driver: local
